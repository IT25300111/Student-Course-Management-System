<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - Coursera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#5624d0', 'deep-charcoal': '#2D2F31', 'success-green': '#1E8E3E' },
                    fontFamily: { sans: ['Inter'] },
                    maxWidth: { 'container-max': '1340px' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="bg-white sticky top-0 z-50 border-b border-gray-200 shadow-sm">
    <div class="max-w-container-max mx-auto px-4 md:px-6 flex justify-between items-center h-16">
        <a href="/" class="text-2xl font-extrabold text-primary">Coursera</a>
        <div class="hidden md:flex items-center gap-6">
            <a href="/" class="text-gray-600 font-medium hover:text-primary">Home</a>
            <a href="/all-courses.html" class="text-gray-600 font-medium hover:text-primary">All Courses</a>
            <a href="/login.html" class="text-gray-600 font-medium hover:text-primary">My Learning</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/login.html" class="px-5 py-2 border border-gray-400 text-gray-700 font-semibold text-sm rounded-md hover:bg-gray-50">Log In</a>
            <a href="/register.html" class="px-5 py-2 bg-deep-charcoal text-white font-semibold text-sm rounded-md hover:opacity-90">Sign Up</a>
        </div>
    </div>
</nav>

<main class="max-w-container-max mx-auto px-4 md:px-6 py-8" id="courseContainer">
    <div class="text-center py-20 text-gray-400">Loading course details...</div>
</main>

<script>
    const formatMoney = (amt) => new Intl.NumberFormat('en-LK', { style: 'currency', currency: 'LKR' }).format(amt);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function subjectsToList(subjects) {
        if (!subjects) return [];
        return subjects.split(',').map(s => s.trim()).filter(Boolean);
    }

    function lecturerList(lecturers = []) {
        if (!lecturers.length) return '<p class="text-gray-500">Lecturer team pending</p>';
        return `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${lecturers.map(lecturer => `
            <div class="flex items-center gap-3 rounded-lg border border-gray-200 p-3">
                <span class="material-symbols-outlined text-primary">school</span>
                <div>
                    <div class="font-semibold text-gray-900">${escapeHtml(lecturer.name)}</div>
                    <div class="text-xs text-gray-500">${escapeHtml(lecturer.username || 'Lecturer')}</div>
                </div>
            </div>
        `).join('')}</div>`;
    }

    async function loadCourseDetails() {
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('id');

        if (!courseId) {
            document.getElementById('courseContainer').innerHTML = '<div class="text-center py-20 text-red-500">No course selected</div>';
            return;
        }

        try {
            const course = await fetch(`/api/courses/${courseId}`).then(res => res.json());
            const subjects = subjectsToList(course.subjects);

            document.getElementById('courseContainer').innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border p-6 md:p-8">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2">
                            <span class="text-xs text-primary font-semibold">${escapeHtml(course.courseCode)}</span>
                            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mt-2 mb-4">${escapeHtml(course.title)}</h1>
                            <p class="text-gray-600 text-lg mb-6">${escapeHtml(course.description || 'No description available')}</p>

                            <div class="border-t border-gray-200 pt-6 mb-6">
                                <h2 class="text-xl font-bold mb-4">Lecturer Team</h2>
                                ${lecturerList(course.lecturers)}
                            </div>

                            <div class="border-t border-gray-200 pt-6 mb-6">
                                <h2 class="text-xl font-bold mb-4">Course Includes</h2>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">schedule</span> <span>Duration: ${escapeHtml(course.duration || 'Flexible')}</span></div>
                                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">groups</span> <span>Capacity: ${course.capacity} students</span></div>
                                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">description</span> <span>Certificate of completion</span></div>
                                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">devices</span> <span>Access on mobile & desktop</span></div>
                                </div>
                            </div>

                            ${subjects.length > 0 ? `
                            <div class="border-t border-gray-200 pt-6">
                                <h2 class="text-xl font-bold mb-4">What You'll Learn</h2>
                                <ul class="list-disc list-inside space-y-2 text-gray-700">
                                    ${subjects.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                                </ul>
                            </div>
                            ` : ''}
                        </div>

                        <div class="lg:col-span-1">
                            <div class="bg-gray-50 rounded-xl border p-6 sticky top-24">
                                <div class="text-3xl font-bold text-primary mb-4">${formatMoney(course.price)}</div>
                                <div class="space-y-3 mb-6">
                                    <a href="/register.html?courseId=${course.id}" class="block w-full py-3 bg-primary text-white text-center font-bold rounded-lg hover:opacity-90">Enroll Now</a>
                                    <button onclick="history.back()" class="block w-full py-3 border border-gray-300 text-gray-700 text-center font-bold rounded-lg hover:bg-gray-50">Back to Courses</button>
                                </div>
                                <div class="text-sm text-gray-500 text-center">30-Day Money-Back Guarantee</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        } catch (err) {
            document.getElementById('courseContainer').innerHTML = `<div class="text-center py-20 text-red-500">Error loading course: ${err.message}</div>`;
        }
    }

    loadCourseDetails();
</script>
</body>
</html>
